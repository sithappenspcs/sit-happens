version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sit-happens-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sithappens
      POSTGRES_PASSWORD: sithappens_dev
      POSTGRES_DB: sithappens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sithappens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sit-happens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
